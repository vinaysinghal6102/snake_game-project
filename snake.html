  <!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <link rel="stylesheet" href="snake.css">
</head>
<body>


<main>
    <section>

        <!-- INFO BAR -->
        <div class="infos">
            <div class="info">
                <h3>High Score : <span id="high-score">0</span></h3>
            </div>
            <div class="info">
                <h3>Score : <span id="score">0</span></h3>
            </div>
            <div class="info">
                <h3>Time : <span id="time">00-00</span></h3>
            </div>
        </div>

        <!-- GAME BOARD -->
        <div class="board"></div>

    </section>
</main>

<!-- MODAL (START + GAME OVER) -->
<div class="modal">
    
    <!-- START SCREEN -->
    <div class="start-game">
        <h2>Snake Game</h2>
        <button class="btn btn-start">Start Game</button>
    </div>

    <!-- GAME OVER SCREEN -->
    <div class="game-over">
        <h2>Game Over</h2>
        <button class="btn btn-restart">Restart</button>
    </div>

</div>

<script src="snake.js"></script>

</body>
</html>


    <script src="snake.js"></script>
</body>
</html>
